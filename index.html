<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix, Escher, and Venice</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            /* 1. Background: St Mark Lion in Venice */
            background-image: url("st-mark.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Semi-transparent overlay to ensure background doesn't wash out foreground content */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* Header layout using Flexbox to push images to the far corners */
        .header-images {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* Styling for the corner images */
        .corner-img {
            max-width: 180px; /* Adjust size as desired */
            height: auto;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .corner-img:hover {
            transform: scale(1.05);
        }

        /* Center content area */
        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 50px;
            padding: 0 20px;
        }

        .main-container h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            margin-bottom: 20px;
        }

        .main-container p {
            font-size: 1.2rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);
        }
         /* Unvisited link */
    a:link {
      color: #1a73e8; 
    }

    /* Visited link */
    a:visited {
      color: #6a0dad; 
    }

    /* Mouse over (hover) link */
    a:hover {
      color: #ff4500; 
    }

    /* Selected/clicked link */
    a:active {
      color: #008000; 
    }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <header class="header-images">
        <img src="phoenix.GIF" alt="Animated Phoenix" class="corner-img">

        <img src="Circle-limit-IV.jpg" alt="M.C. Escher - Circle Limit IV" class="corner-img">
    </header>

    <main class="main-container">
        <h1>Phoenix Renaissance 2026-06-30</h1>
        <style>
  /* Frames the whole table and removes the gaps between cell borders */
  table {
    border-collapse: collapse;
    width: 100%;
  }

  /* Frames individual header and data cells, and aligns items left */
  th, td {
    border: 2px solid white; /* Creates the frame around cells */
    text-align: left;        /* Aligns all cell items to the left */
    padding: 8px;           /* Adds readable space inside the frame */

 }
            th {
    background-color: #FF0000; /* Light grey background for header cells */
  }

  /* Custom class to change a single cell's background */
  .highlight-cell {
    background-color: #000000; /* Bright yellow background */
  }
</style>
<table style="margin-left: auto; margin-right: auto;">
    <tr>
    <th style="width: 100px;">Link</th><th style="width: 200px;">Comment</th>
     </tr>
    <tr>
        <td class="highlight-cell"><a href="https://ubpdqn.github.io/">ubpdqn.github.io</a></td>
        <td class="highlight-cell">Original Github website</td>
    </tr>
     <tr>
        <td class="highlight-cell"><a href="https://rpubs.com/atomofjustice/">RPUBS</a></td>
        <td class="highlight-cell">RPUBS prior statistical explorations</td>
    </tr>
    <tr>
        <td class="highlight-cell"><a href="timeline.html">Timeline</a></td>
        <td class="highlight-cell">A short history of cardiac catheterization</td>
    </tr>
     <tr>
        <td class="highlight-cell"><a href="https://ubpdqnmathematica.wordpress.com/">Mathematica Blog</a></td>
        <td class="highlight-cell">Blog started in 2012 to explore Mathematica</td>
    </tr>
</table>


        
    </main>

</body>
</html>
